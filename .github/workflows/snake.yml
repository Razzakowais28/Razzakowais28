name: Generate Contribution Snake

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/snake.yml"

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: Generate snake SVG
        uses: Platane/snk@v3
        with:
          github_user_name: Razzakowais28
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=%2364748B&color_dots=%2316161d,%230e4429,%23006d32,%2326a641,%2339d353
            dist/github-contribution-grid-snake-dark.svg?color_snake=%2394A3B8&color_dots=%2316161d,%230e4429,%23006d32,%2326a641,%2339d353

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
